name = "jiobase-api"
main = "src/index.ts"
compatibility_date = "2025-02-27"
compatibility_flags = ["nodejs_compat"]

# Add your domain to Cloudflare (Workers & Pages > Add a site), then uncomment and replace YOUR_DOMAIN:
# routes = [
#   { pattern = "api.YOUR_DOMAIN/*", zone_name = "YOUR_DOMAIN" }
# ]

[[d1_databases]]
binding = "DB"
database_name = "jiobase-db"
database_id = "fec63809-e1fa-48eb-80b5-a5754fe9bc70"
migrations_dir = "drizzle"

[[kv_namespaces]]
binding = "PROXY_CONFIG"
id = "e940e0cfa1e6436382e40a0cafdea6b5"

[vars]
ENVIRONMENT = "production"
# Replace with your domain, e.g. https://app.your-domain.com
APP_URL = "https://app.your-domain.com"
