name = "jiobase-proxy"
main = "src/index.ts"
compatibility_date = "2025-02-27"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "*.jiobase.com/*", zone_name = "jiobase.com" }
]

[[kv_namespaces]]
binding = "PROXY_CONFIG"
id = "e940e0cfa1e6436382e40a0cafdea6b5"

[[kv_namespaces]]
binding = "RATE_LIMITS"
id = "915a6a60051e4ee18da82b14dc9a3bd7"

# Analytics Engine for request metrics
# [[analytics_engine_datasets]]
# binding = "ANALYTICS"
# dataset = "proxy_requests"

[vars]
ENVIRONMENT = "production"
PROXY_DOMAIN = "jiobase.com"
