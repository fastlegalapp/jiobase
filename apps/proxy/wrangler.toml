name = "jiobase-proxy"
main = "src/index.ts"
compatibility_date = "2025-02-27"
compatibility_flags = ["nodejs_compat"]

# Add your domain to Cloudflare (Workers & Pages > Add a site), then uncomment and replace YOUR_DOMAIN:
# routes = [
#   { pattern = "*.YOUR_DOMAIN/*", zone_name = "YOUR_DOMAIN" }
# ]

[[kv_namespaces]]
binding = "PROXY_CONFIG"
id = "e940e0cfa1e6436382e40a0cafdea6b5"

[[kv_namespaces]]
binding = "RATE_LIMITS"
id = "915a6a60051e4ee18da82b14dc9a3bd7"

# Analytics Engine for request metrics
# [[analytics_engine_datasets]]
# binding = "ANALYTICS"
# dataset = "proxy_requests"

[vars]
ENVIRONMENT = "production"
# Replace with your domain, e.g. your-domain.com (used for *.your-domain.com proxy subdomains)
PROXY_DOMAIN = "your-domain.com"
